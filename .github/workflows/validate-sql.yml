name: Validar scripts SQL

on:
  push:
    paths:
      - '**/*.sql'
  pull_request:
    paths:
      - '**/*.sql'

jobs:
  validate_sql:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Validar proyectos en SQL
        run: |
          echo "✅ Validando proyectos en archivos SQL..."
          ALLOWED_PROJECTS=("premium-guide-410714" "bigquery-public-data")
          FILES=$(find . -name "*.sql")
          INVALID=0

          for F in $FILES; do
            echo "🔍 Revisando $F"
            # Sólo coincide con `proyecto.dataset.tabla`
            MATCHES=$(grep -Eo "\`[A-Za-z0-9_-]+\.[A-Za-z0-9_]+\.[A-Za-z0-9_]+\`" "$F" \
                      | tr -d '\`' \
                      | cut -d'.' -f1 \
                      | sort -u)

            for P in $MATCHES; do
              if [[ ! " ${ALLOWED_PROJECTS[@]} " =~ " ${P} " ]]; then
                echo "❌ Proyecto no permitido en $F : $P"
                INVALID=1
              fi
            done
          done

          if [[ $INVALID -eq 1 ]]; then
            echo "::error ::Validación fallida: sólo se permiten premium-guide-410714 y bigquery-public-data"
            exit 1
          else
            echo "✅ Todos los scripts usan proyectos válidos."
          fi
